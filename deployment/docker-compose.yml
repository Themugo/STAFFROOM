version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: staffroom
      POSTGRES_USER: staffroom
      POSTGRES_PASSWORD: staffroom123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ../backend
    environment:
      DATABASE_URL: postgresql://staffroom:staffroom123@postgres:5432/staffroom
      NODE_ENV: development
      JWT_SECRET: dev_secret_key
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
