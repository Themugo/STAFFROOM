
version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: staffroom-db
    environment:
      POSTGRES_USER: staffroom
      POSTGRES_PASSWORD: staffroom_password
      POSTGRES_DB: staffroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffroom"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    container_name: staffroom-api
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://staffroom:staffroom_password@postgres:5432/staffroom
      JWT_SECRET: dev_secret_change_in_production
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  web:
    build: ./apps/web
    container_name: staffroom-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  postgres_data:
