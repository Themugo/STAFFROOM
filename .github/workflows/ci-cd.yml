name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: staffroom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      
      - name: Install dependencies
        working-directory: ./apps/api
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: ./packages/db
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/staffroom_test
      
      - name: Run database migrations
        working-directory: ./packages/db
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/staffroom_test
      
      - name: Run API tests
        working-directory: ./apps/api
        run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/staffroom_test
          JWT_SECRET: test_secret_key
          FRONTEND_URL: http://localhost:5173
          NODE_ENV: test
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/api/coverage/lcov.info
          flags: api
          name: api-coverage

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      
      - name: Install dependencies
        working-directory: ./apps/web
        run: npm ci
      
      - name: Run Web tests
        working-directory: ./apps/web
        run: npm test
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/web/coverage/lcov.info
          flags: web
          name: web-coverage

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [test-api]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      
      - name: Install dependencies
        working-directory: ./apps/api
        run: npm ci
      
      - name: Build API
        working-directory: ./apps/api
        run: npm run build
        if: success()

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [test-web]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      
      - name: Install dependencies
        working-directory: ./apps/web
        run: npm ci
      
      - name: Build Web
        working-directory: ./apps/web
        run: npm run build
        if: success()

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [build-api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Railway
        uses: railwayapp/cli@v1.0.0
        with:
          railway-token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID }}
          command: deploy

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/web
